<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Tracking Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #4CAF50; }
        .form-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; }
        input[type="checkbox"] { width: 22px; height: 22px; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 60%; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #45a049; }
        h3 { margin-bottom: 10px; border-bottom: 2px solid #4CAF50; display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>⚙️ System Config</h1>
    
    <div class="form-group">
        <label>🤖 Allow Python Simulation Riders</label>
        <input type="checkbox" id="simEnabled">
    </div>

    <div class="form-group">
        <label>📱 Allow Real Mobile Trackers</label>
        <input type="checkbox" id="realEnabled">
    </div>

    <hr>
    <h3>Simulated Rider Names</h3>
    
    <div class="form-group">
        <label>Rider 1</label>
        <input type="text" id="name1">
        <input type="checkbox" id="active1" title="Enable Rider 1">
    </div>

    <div class="form-group">
        <label>Rider 2</label>
        <input type="text" id="name2">
        <input type="checkbox" id="active2" title="Enable Rider 2">
    </div>

    <div class="form-group">
        <label>Rider 3</label>
        <input type="text" id="name3">
        <input type="checkbox" id="active3" title="Enable Rider 3">
    </div>

    <button onclick="saveConfig()">Save Configuration to Backend</button>
</div>

<script>
    // Fetch initial config and populate form
    let initialConfig = {};
    fetch('http://localhost:3001/api/admin/config')
        .then(res => res.json())
        .then(config => {
            initialConfig = config;
            document.getElementById('simEnabled').checked = config.simulationEnabled;
            document.getElementById('realEnabled').checked = config.realRidersEnabled;

            document.getElementById('name1').value = config.simulatedRiders.rider_1.name;
            document.getElementById('active1').checked = config.simulatedRiders.rider_1.active;
            
            document.getElementById('name2').value = config.simulatedRiders.rider_2.name;
            document.getElementById('active2').checked = config.simulatedRiders.rider_2.active;
            
            document.getElementById('name3').value = config.simulatedRiders.rider_3.name;
            document.getElementById('active3').checked = config.simulatedRiders.rider_3.active;
        });

    // Save changes via POST back to the Node API
    function saveConfig() {
        const payload = {
            simulationEnabled: document.getElementById('simEnabled').checked,
            realRidersEnabled: document.getElementById('realEnabled').checked,
            simulatedRiders: {
                rider_1: { name: document.getElementById('name1').value, active: document.getElementById('active1').checked },
                rider_2: { name: document.getElementById('name2').value, active: document.getElementById('active2').checked },
                rider_3: { name: document.getElementById('name3').value, active: document.getElementById('active3').checked }
            }
        };

        fetch('http://localhost:3001/api/admin/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json())
          .then(data => {
              alert(data.success ? 'System configured! Changes applied live.' : 'Error saving layout.');
          });
    }
</script>

</body>
</html>
