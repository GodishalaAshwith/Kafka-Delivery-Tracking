<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <nav class="navbar">
        <h2>âš™ď¸Ź Admin Control Center</h2>
        <div class="nav-links">
            <a href="index.html">Live Map</a>
            <a href="admin.html" class="active">Admin Dashboard</a>
            <a href="mobile-tracker.html">Rider App</a>
        </div>
    </nav>
    <div class="main-content">
        <div class="card">
            <h1>System Configuration</h1>
            <p style="text-align: center; color: #666; margin-bottom: 25px;">Toggle simulation systems and manage active connections globally.</p>

            <div class="form-group">
                <label>í´– Allow Python Simulation Riders</label>
                <input type="checkbox" id="simEnabled">
            </div>

            <div class="form-group" style="padding-bottom: 20px;">
                <label>íł± Allow Real Mobile Trackers (4G/5G)</label>
                <input type="checkbox" id="realEnabled">
            </div>

            <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
            <h3 style="color: #4CAF50; margin-bottom: 20px;">Simulated Rider Roster</h3>

            <div class="form-group">
                <label>Rider 1 Name</label>
                <input type="text" id="name1">
                <input type="checkbox" id="active1" title="Enable Rider 1">
            </div>

            <div class="form-group">
                <label>Rider 2 Name</label>
                <input type="text" id="name2">
                <input type="checkbox" id="active2" title="Enable Rider 2">
            </div>

            <div class="form-group">
                <label>Rider 3 Name</label>
                <input type="text" id="name3">
                <input type="checkbox" id="active3" title="Enable Rider 3">
            </div>

            <button class="btn btn-primary" onclick="saveConfig()">Save Settings & Publish to Engine</button>
        </div>
    </div>

    <script>
        fetch(`${BACKEND_URL}/api/admin/config`)
            .then(res => res.json())
            .then(config => {
                document.getElementById('simEnabled').checked = config.simulationEnabled;
                document.getElementById('realEnabled').checked = config.realRidersEnabled;

                document.getElementById('name1').value = config.simulatedRiders.rider_1.name;
                document.getElementById('active1').checked = config.simulatedRiders.rider_1.active;

                document.getElementById('name2').value = config.simulatedRiders.rider_2.name;
                document.getElementById('active2').checked = config.simulatedRiders.rider_2.active;

                document.getElementById('name3').value = config.simulatedRiders.rider_3.name;
                document.getElementById('active3').checked = config.simulatedRiders.rider_3.active;
            });

        function saveConfig() {
            const payload = {
                simulationEnabled: document.getElementById('simEnabled').checked,
                realRidersEnabled: document.getElementById('realEnabled').checked,
                simulatedRiders: {
                    rider_1: { name: document.getElementById('name1').value, active: document.getElementById('active1').checked },
                    rider_2: { name: document.getElementById('name2').value, active: document.getElementById('active2').checked },
                    rider_3: { name: document.getElementById('name3').value, active: document.getElementById('active3').checked }
                }
            };

            fetch(`${BACKEND_URL}/api/admin/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json())
              .then(data => {
                  alert(data.success ? 'Success! Settings applied to real-time engine.' : 'Error saving layout.');
              });
        }
    </script>
</body>
</html>
