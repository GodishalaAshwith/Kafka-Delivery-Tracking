<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Rider Tracking</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
    <script src="config.js"></script>
    <style>
        .rider-label { font-size: 14px; font-weight: bold; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2) !important; border: 2px solid #ccc; }
        .mt-1 { margin-top: 5px; }
        @keyframes pulse-red {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255,0,0,0.8)); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 15px rgba(255,0,0,1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255,0,0,0.8)); }
        }
        .pulse-red { animation: pulse-red 1s infinite; z-index: 1000 !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2> Tracking Engine</h2>
        <div class="nav-links">
            <a href="index.html" class="active">Live Map</a>
            <a href="admin.html">Admin</a>
            <a href="mobile-tracker.html">Rider App</a>
        </div>
    </nav>
    <div class="container">
        <aside class="sidebar">
            <h3> Active Riders</h3>
            <div id="riders-list">
                <p style="color: #888; font-style: italic;">Waiting for riders to connect...</p>
            </div>
        </aside>
        <div id="map"></div>
    </div>

    <script>
        const map = L.map('map').setView([17.3850, 78.4867], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = {};
        const riderCards = {};
        const riderLastSeen = {};

        const socket = io(BACKEND_URL, {
            extraHeaders: {
                "ngrok-skip-browser-warning": "69420"
            }
        });

        const riderIcon = L.divIcon({
            html: '<div style="font-size: 30px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));">🛵</div>',
            className: 'custom-rider-icon',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            popupAnchor: [0, -15]
        });

        function updateSidebar(id, displayName, location, timestamp) {
            const list = document.getElementById('riders-list');
            // If the waiting text is still there, clear it
            if (Object.keys(riderCards).length === 0) list.innerHTML = '';
            
            const timeStr = new Date(timestamp * 1000).toLocaleTimeString();

            if (!riderCards[id]) {
                const div = document.createElement('div');
                div.className = 'rider-card active';
                div.id = `card-${id}`;
                div.innerHTML = `
                    <div class="rider-name">${displayName} <span class="status-badge">Active</span></div>
                    <div class="rider-meta"><strong>ID:</strong> ${id}</div>
                    <div class="rider-meta mt-1">
                        <strong>Lat:</strong> <span id="lat-${id}">${location.lat.toFixed(4)}</span> | 
                        <strong>Lng:</strong> <span id="lng-${id}">${location.lng.toFixed(4)}</span>
                    </div>
                    <div class="rider-meta mt-1" style="background: #eef2f5; padding: 5px; border-radius: 4px;">
                        <strong>🤖 AI ETA:</strong> <span id="eta-${id}" style="color: #2196f3; font-weight: bold;">Calculating...</span> min
                        <br><strong>⚠️ Status:</strong> <span id="anomaly-${id}" style="color: green; font-weight: bold;">Normal</span>
                    </div>
                    <div class="rider-meta"><strong>Updated:</strong> <span id="time-${id}">${timeStr}</span></div>
                `;
                list.appendChild(div);
                riderCards[id] = div;
            } else {
                document.getElementById(`lat-${id}`).innerText = location.lat.toFixed(4);
                document.getElementById(`lng-${id}`).innerText = location.lng.toFixed(4);
                document.getElementById(`time-${id}`).innerText = timeStr;
            }
        }

        socket.on('rider-location-update', (data) => {
            const { rider_id, location, name, timestamp, predicted_eta_minutes, is_anomaly } = data;
            const displayName = name || rider_id;
            riderLastSeen[rider_id] = Date.now();

            updateSidebar(rider_id, displayName, location, timestamp || Date.now()/1000);

            // Update AI ETA & Anomaly Status in Sidebar
            const etaSpan = document.getElementById(`eta-${rider_id}`);
            const anomalySpan = document.getElementById(`anomaly-${rider_id}`);
            
            if (etaSpan && predicted_eta_minutes !== undefined) {
                etaSpan.innerText = predicted_eta_minutes.toFixed(1);
            }
            if (anomalySpan && is_anomaly !== undefined) {
                if (is_anomaly) {
                    anomalySpan.innerText = "FRAUD DETECTED";
                    anomalySpan.style.color = "red";
                } else {
                    anomalySpan.innerText = "Normal";
                    anomalySpan.style.color = "green";
                }
            }

            // Flag rider icon in red if anomaly detected
            const dynamicRiderIcon = L.divIcon({
                html: `<div class="${is_anomaly ? 'pulse-red' : ''}" style="font-size: 30px; width: 30px; height: 30px; line-height: 30px; text-align: center; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5)); transition: all 0.3s;">🛵</div>`,
                className: 'custom-rider-icon',
                iconSize: [30, 30],
                iconAnchor: [15, 15],
                popupAnchor: [0, -15]
            });

            if (markers[rider_id]) {
                markers[rider_id].setLatLng([location.lat, location.lng]);
                markers[rider_id].setIcon(dynamicRiderIcon);
                markers[rider_id].setTooltipContent(`<b>${displayName}</b> ${is_anomaly ? '<span style="color:red;">⚠️</span>' : ''}`);
            } else {
                markers[rider_id] = L.marker([location.lat, location.lng], { icon: dynamicRiderIcon })
                    .addTo(map)
                    .bindTooltip(`<b>${displayName}</b> ${is_anomaly ? '<span style="color:red;">⚠️</span>' : ''}`, { permanent: true, direction: 'right', offset: [15, 0], className: 'rider-label' })
                    .openTooltip();

                const group = new L.featureGroup(Object.values(markers));
                map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 15 });
            }
        });

        socket.on('rider-disconnected', (data) => {
            const { rider_id } = data;
            if (markers[rider_id]) {
                map.removeLayer(markers[rider_id]);
                delete markers[rider_id];
            }
            if (riderCards[rider_id]) {
                riderCards[rider_id].remove();
                delete riderCards[rider_id];
            }
            if (riderLastSeen[rider_id]) {
                delete riderLastSeen[rider_id];
            }
            if (Object.keys(riderCards).length === 0) {
                document.getElementById('riders-list').innerHTML = '<p style="color: #888; font-style: italic;">No riders active yet...</p>';
            }
        });

        // Safety net: remove riders if no updates arrive for a while.
        setInterval(() => {
            const now = Date.now();
            const staleAfterMs = 30000;

            Object.keys(riderLastSeen).forEach((id) => {
                if (now - riderLastSeen[id] > staleAfterMs) {
                    if (markers[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }
                    if (riderCards[id]) {
                        riderCards[id].remove();
                        delete riderCards[id];
                    }
                    delete riderLastSeen[id];
                }
            });

            if (Object.keys(riderCards).length === 0) {
                document.getElementById('riders-list').innerHTML = '<p style="color: #888; font-style: italic;">No riders active yet...</p>';
            }
        }, 2000);

        socket.on('config-updated', (config) => {
            if (!config.simulationEnabled) {
                Object.keys(markers).forEach(id => {
                   if (!id.includes('real')) { 
                       map.removeLayer(markers[id]); delete markers[id]; 
                       if(riderCards[id]){ riderCards[id].remove(); delete riderCards[id]; }
                   }
                });
            } else {
                Object.keys(config.simulatedRiders).forEach(id => {
                    if (!config.simulatedRiders[id].active && markers[id]) {
                        map.removeLayer(markers[id]); delete markers[id];
                        if(riderCards[id]){ riderCards[id].remove(); delete riderCards[id]; }
                    }
                });
            }
            if (Object.keys(riderCards).length === 0) {
                document.getElementById('riders-list').innerHTML = '<p style="color: #888; font-style: italic;">No riders active yet...</p>';
            }
        });
    </script>
</body>
</html>
