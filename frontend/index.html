<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Rider Tracking Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📍</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; margin: 0; padding: 0; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([17.3850, 78.4867], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = {};
        const socket = io('http://localhost:3001');

        const riderIcon = L.divIcon({
            html: '<div style="font-size: 30px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));">🛵</div>',
            className: 'custom-rider-icon',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            popupAnchor: [0, -15]
        });

        socket.on('rider-location-update', (data) => {
            const { rider_id, location } = data;
            
            if (markers[rider_id]) {
                markers[rider_id].setLatLng([location.lat, location.lng]);
            } else {
                markers[rider_id] = L.marker([location.lat, location.lng], { icon: riderIcon })
                    .addTo(map)
                    .bindPopup(`<b>${rider_id}</b>`)
                    .openPopup();
            }
        });
    </script>
</body>
</html>
